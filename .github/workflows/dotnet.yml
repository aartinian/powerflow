name: .NET CI

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PowerFlow.slnx

      - name: Build
        run: dotnet build PowerFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PowerFlow.slnx --configuration Release --no-build --verbosity normal
